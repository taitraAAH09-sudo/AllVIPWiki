<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長官中英一覽表</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, updateDoc, doc,
    onSnapshot, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* =======================================================
     ▼▼▼  在這裡貼上你自己的 Firebase 設定  ▼▼▼
     Firebase Console → 專案設定 → 一般 → 你的應用程式
  ======================================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyACg1t8jLtW2zIvNCDUhJPzU_SJ5vV6LUE",
    authDomain: "all-vip-wiki.firebaseapp.com",
    projectId: "all-vip-wiki",
    storageBucket: "all-vip-wiki.firebasestorage.app",
    messagingSenderId: "936976436491",
    appId: "1:936976436491:web:7dc06635df6d982156260e"
  };
  /* ======================================================= */

  let app, db, isConnected = false;
  let allRecords = [];
  let readOnly = true; // 預設為觀看模式，需輸入密碼才能編輯
  const EDIT_PASSWORD = "taitra2026";

  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const listEl = document.getElementById('list');
  const emptyEl = document.getElementById('empty-state');
  const countEl = document.getElementById('count-text');
  const searchInput = document.getElementById('search-input');
  const addBtn = document.getElementById('add-btn');
  const refreshBtn = document.getElementById('refresh-btn');
  const readonlyBtn = document.getElementById('readonly-btn');
  const modal = document.getElementById('modal');
  const modalForm = document.getElementById('modal-form');
  const modalClose = document.getElementById('modal-close');
  const modalCancel = document.getElementById('modal-cancel');
  const photoInput = document.getElementById('photo-input');
  const photoPreview = document.getElementById('photo-preview');
  let photoDataUrl = null;

  const passwordModal = document.getElementById('password-modal');
  const passwordInput = document.getElementById('password-input');
  const passwordSubmit = document.getElementById('password-submit');
  const passwordCancel = document.getElementById('password-cancel');
  const passwordClose = document.getElementById('password-close');

  // ---------- Firebase 連接 ----------
  try {
    if (firebaseConfig.apiKey.includes("在這裡貼上")) {
      throw new Error("尚未設定 Firebase Config");
    }
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    isConnected = true;
    setStatus(true, "共用資料庫");

    const q = query(collection(db, "officers"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
      allRecords = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, (err) => {
      setStatus(false, "連接失敗，請檢查安全規則");
      console.error(err);
    });
  } catch (e) {
    setStatus(false, "示範模式（未連接 Firebase）");
    console.warn(e.message);
    render();
  }

  function setStatus(ok, text) {
    statusDot.className = "status-dot " + (ok ? "status-dot--ok" : "status-dot--warn");
    statusText.textContent = text;
  }

  // ---------- 示範模式暫存資料 ----------
  let demoCounter = 1;

  // ---------- 搜尋 / 篩選 ----------
  function getFiltered() {
    const kw = searchInput.value.trim().toLowerCase();
    if (!kw) return []; // 沒有搜尋內容時，不顯示任何資料
    return allRecords.filter(r => {
      const hay = [r.companyZh, r.companyEn, r.nameZh, r.nameEn, r.titleZh, r.titleEn]
        .filter(Boolean).join(" ").toLowerCase();
      return hay.includes(kw);
    });
  }

  function render() {
    const filtered = getFiltered();
    countEl.textContent = `共收錄 ${allRecords.length} 筆 ／ 目前顯示 ${filtered.length} 筆`;
    listEl.innerHTML = "";
    addBtn.style.display = readOnly ? "none" : "inline-flex";

    if (filtered.length === 0) {
      emptyEl.style.display = "flex";
      const sub = emptyEl.querySelector('.empty-sub');
      const title = emptyEl.querySelector('.empty-title');
      if (allRecords.length === 0) {
        title.textContent = "目前還沒有任何資料";
        sub.textContent = "點擊右上角「新增」建立第一筆資料";
      } else if (!searchInput.value.trim()) {
        title.textContent = "請輸入關鍵字開始搜尋";
        sub.textContent = `目前共收錄 ${allRecords.length} 筆資料，輸入公司、姓名或職稱以查看`;
      } else {
        title.textContent = "找不到符合的資料";
        sub.textContent = "換個關鍵字再試試看";
      }
      return;
    }
    emptyEl.style.display = "none";

    filtered.forEach(r => listEl.appendChild(buildCard(r)));
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || "";
    return d.innerHTML;
  }

  function buildCard(r) {
    const card = document.createElement('div');
    card.className = "card-row";

    const line2 = [r.nameZh, r.titleZh].filter(Boolean).join('　');
    const line3 = [r.nameEn, r.titleEn, r.companyEn].filter(Boolean).join(', ');

    card.innerHTML = `
      <div class="avatar">
        ${r.photo ? `<img src="${r.photo}" alt="">` : `<span>${esc((r.nameZh || r.companyZh || '?')[0])}</span>`}
      </div>
      <div class="info">
        <div class="info__company">${esc(r.companyZh)}</div>
        <div class="info__name">${esc(line2)}</div>
        ${line3 ? `<div class="info__sub dim">${esc(line3)}</div>` : ''}
      </div>
      ${!readOnly ? `
        <div class="row-actions">
          <button class="edit-btn" title="編輯">✎</button>
          <button class="delete-btn" title="刪除">✕</button>
        </div>` : ''}
    `;
    if (!readOnly) {
      card.querySelector('.delete-btn').addEventListener('click', () => removeRecord(r.id));
      card.querySelector('.edit-btn').addEventListener('click', () => openEditModal(r));
    }
    return card;
  }

  async function removeRecord(id) {
    if (!confirm("確定要刪除這筆資料嗎？")) return;
    if (isConnected) {
      try { await deleteDoc(doc(db, "officers", id)); }
      catch (e) { alert("刪除失敗：" + e.message); }
    } else {
      allRecords = allRecords.filter(r => r.id !== id);
      render();
    }
  }

  // ---------- 照片預覽（自動壓縮成縮圖）----------
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.onload = () => {
        const size = 160;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        photoDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        photoPreview.innerHTML = `<img src="${photoDataUrl}" alt="">`;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  // ---------- 新增 / 編輯資料 Modal ----------
  let editingId = null; // null = 新增模式；有值 = 編輯模式

  const modalTitleEl = document.getElementById('modal-title');

  addBtn.addEventListener('click', () => {
    editingId = null;
    modalTitleEl.childNodes[0].textContent = "新增資料 ";
    modalForm.reset();
    photoDataUrl = null;
    photoPreview.innerHTML = `<span class="photo-placeholder">🖼</span>`;
    modal.classList.add('modal--open');
  });

  function openEditModal(r) {
    editingId = r.id;
    modalTitleEl.childNodes[0].textContent = "編輯資料 ";
    document.getElementById('company-zh').value = r.companyZh || '';
    document.getElementById('company-en').value = r.companyEn || '';
    document.getElementById('name-zh').value = r.nameZh || '';
    document.getElementById('name-en').value = r.nameEn || '';
    document.getElementById('title-zh').value = r.titleZh || '';
    document.getElementById('title-en').value = r.titleEn || '';
    photoDataUrl = r.photo || null;
    photoPreview.innerHTML = photoDataUrl
      ? `<img src="${photoDataUrl}" alt="">`
      : `<span class="photo-placeholder">🖼</span>`;
    modal.classList.add('modal--open');
  }

  function closeModal() { modal.classList.remove('modal--open'); }
  modalClose.addEventListener('click', closeModal);
  modalCancel.addEventListener('click', closeModal);
  // 注意：點擊視窗外的灰色背景「不會」關閉新增視窗，避免填到一半不小心點掉
  // 只有按「取消」按鈕或成功送出資料，才會關閉這個視窗

  modalForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const record = {
      companyZh: document.getElementById('company-zh').value.trim(),
      companyEn: document.getElementById('company-en').value.trim(),
      nameZh: document.getElementById('name-zh').value.trim(),
      nameEn: document.getElementById('name-en').value.trim(),
      titleZh: document.getElementById('title-zh').value.trim(),
      titleEn: document.getElementById('title-en').value.trim(),
      photo: photoDataUrl || null,
    };

    if (isConnected) {
      try {
        if (editingId) {
          await updateDoc(doc(db, "officers", editingId), record);
        } else {
          await addDoc(collection(db, "officers"), { ...record, createdAt: Date.now() });
        }
      } catch (e) {
        alert((editingId ? "更新失敗：" : "新增失敗：") + e.message);
        return;
      }
    } else {
      if (editingId) {
        allRecords = allRecords.map(x => x.id === editingId ? { ...x, ...record } : x);
      } else {
        allRecords.push({ id: 'demo-' + (demoCounter++), ...record });
      }
      render();
    }
    editingId = null;
    closeModal();
  });

  // ---------- 其他控制 ----------
  searchInput.addEventListener('input', render);
  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spin');
    setTimeout(() => refreshBtn.classList.remove('spin'), 500);
    render();
  });
  readonlyBtn.addEventListener('click', () => {
    if (readOnly) {
      // 目前是唯讀，要解鎖 -> 跳出密碼視窗
      passwordInput.value = "";
      passwordModal.classList.add('modal--open');
      setTimeout(() => passwordInput.focus(), 50);
    } else {
      // 目前已解鎖，點一下重新鎖回唯讀
      readOnly = true;
      updateReadonlyBtn();
      render();
    }
  });

  function updateReadonlyBtn() {
    readonlyBtn.innerHTML = readOnly ? `🔒 觀看模式` : `🔓 編輯模式（已解鎖）`;
    readonlyBtn.classList.toggle('readonly-btn--active', !readOnly);
  }

  function closePasswordModal() { passwordModal.classList.remove('modal--open'); }
  passwordCancel.addEventListener('click', closePasswordModal);
  passwordClose.addEventListener('click', closePasswordModal);
  passwordModal.addEventListener('click', (e) => { if (e.target === passwordModal) closePasswordModal(); });

  function tryUnlock() {
    if (passwordInput.value === EDIT_PASSWORD) {
      readOnly = false;
      updateReadonlyBtn();
      closePasswordModal();
      render();
    } else {
      alert("密碼錯誤，請再試一次");
      passwordInput.value = "";
      passwordInput.focus();
    }
  }
  passwordSubmit.addEventListener('click', tryUnlock);
  passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });

  updateReadonlyBtn();
</script>

<style>
  :root {
    --navy: #1c2b3a;
    --navy-light: #2c4258;
    --gold: #b08d57;
    --gold-light: #d4b483;
    --paper: #f4f1ea;
    --paper-line: #e2ddd0;
    --ink: #232323;
    --ink-soft: #75705f;
    --danger: #a3453b;
    --ok: #3d6b4f;
    --warn: #a3762f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 36px 24px 60px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }

  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 16px; margin-bottom: 4px;
  }
  .header h1 {
    font-size: 28px; margin: 0 0 6px; color: var(--navy);
    letter-spacing: 0.08em; font-weight: 800;
  }
  .header .subtitle {
    font-size: 12px; color: var(--ink-soft); letter-spacing: 0.15em;
    font-family: "Courier New", monospace; text-transform: uppercase;
  }
  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .status-pill {
    display: flex; align-items: center; gap: 6px; font-size: 12.5px;
    color: var(--ink-soft); padding: 6px 12px; background: #fff;
    border: 1px solid var(--paper-line); border-radius: 999px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #999; }
  .status-dot--ok { background: var(--ok); }
  .status-dot--warn { background: var(--warn); }

  .btn {
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    padding: 8px 14px; border-radius: 6px; border: 1px solid var(--paper-line);
    background: #fff; color: var(--navy); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--gold); }
  .btn.spin svg { animation: spin 0.5s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn--primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .btn--primary:hover { background: var(--navy-light); }

  .readonly-btn--active { background: #f2e7d3; border-color: var(--warn); color: var(--warn); }

  hr.divider { border: none; border-top: 2px solid var(--navy); margin: 18px 0 14px; }

  .desc { font-size: 13px; color: var(--ink-soft); margin-bottom: 20px; }

  .search-box {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--paper-line); border-radius: 6px;
    padding: 12px 16px; margin-bottom: 14px;
  }
  .search-box input {
    border: none; outline: none; font-size: 14px; flex: 1;
    font-family: inherit; background: transparent; color: var(--ink);
  }
  .search-box input::placeholder { color: #a39d8e; }

  .count-text { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 18px; }

  .card-row {
    display: flex; align-items: center; gap: 16px;
    background: #fff; border: 1px solid var(--paper-line); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 10px;
    transition: box-shadow 0.15s;
  }
  .card-row:hover { box-shadow: 0 2px 8px rgba(28,43,58,0.06); }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
    background: var(--paper-line); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--navy); font-weight: 700; font-size: 16px;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .info { flex: 1; min-width: 0; }
  .info__company { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 3px; }
  .info__name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .dim { color: var(--ink-soft); font-weight: 400; }
  .badge {
    margin-left: 8px; font-size: 11px; font-weight: 600; color: var(--navy-light);
    background: #eef1f4; padding: 2px 8px; border-radius: 999px;
  }

  .info__sub { font-size: 12.5px; margin-top: 2px; }

  .row-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .edit-btn, .delete-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--paper-line);
    background: none; color: var(--ink-soft); cursor: pointer; font-size: 13px;
    flex-shrink: 0; transition: all 0.15s;
  }
  .edit-btn:hover { background: var(--navy); border-color: var(--navy); color: #fff; }
  .delete-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 70px 24px; gap: 10px; color: var(--ink-soft);
  }
  .empty-seal {
    width: 64px; height: 64px; border: 2px dashed var(--gold-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--gold-light); font-weight: 700;
  }
  .empty-title { font-size: 15px; font-weight: 700; color: var(--navy); }
  .empty-sub { font-size: 13px; }

  /* ---------- Modal ---------- */
  .modal {
    position: fixed; inset: 0; background: rgba(28,43,58,0.5);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50;
  }
  .modal--open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 10px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto; padding: 28px;
  }
  .modal-box h2 {
    font-size: 18px; margin: 0 0 20px; color: var(--navy);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close {
    background: none; border: none; font-size: 18px; color: var(--ink-soft); cursor: pointer;
  }
  .field-group { margin-bottom: 16px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }
  .field-group label, .field-row label {
    display: block; font-size: 12.5px; color: var(--navy-light); font-weight: 600; margin-bottom: 6px;
  }
  .field-group label span, .field-row label span { color: var(--ink-soft); font-weight: 400; }
  .field-group input, .field-row input {
    width: 100%; font-family: inherit; font-size: 14px; padding: 10px 12px;
    border: 1px solid var(--paper-line); border-radius: 5px; background: var(--paper);
    color: var(--ink); outline: none;
  }
  .field-group input:focus, .field-row input:focus { border-color: var(--gold); background: #fff; }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--gold); font-weight: 700; margin: 20px 0 10px;
  }

  .photo-row { display: flex; align-items: center; gap: 14px; }
  .photo-preview {
    width: 56px; height: 56px; border-radius: 8px; background: var(--paper);
    border: 1px solid var(--paper-line); display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-placeholder { font-size: 20px; color: #b8b2a0; }
  .file-btn {
    font-size: 13px; padding: 9px 14px; border: 1px solid var(--paper-line);
    border-radius: 5px; background: var(--paper); color: var(--navy); cursor: pointer;
  }

  .modal-actions {
    display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px;
    border-top: 1px solid var(--paper-line); padding-top: 18px;
  }

  .note {
    font-size: 12px; color: var(--ink-soft); line-height: 1.7; margin-top: 28px;
    padding: 14px 18px; background: #fbf8f1; border-left: 3px solid var(--gold); border-radius: 2px;
  }
  .note code { background: #efe9da; padding: 1px 5px; border-radius: 2px; font-size: 11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>長官中英一覽表</h1>
        <div class="subtitle">Executive Bilingual Directory</div>
      </div>
      <div class="toolbar">
        <span class="status-pill"><span id="status-dot" class="status-dot"></span><span id="status-text">連接中…</span></span>
        <button id="refresh-btn" class="btn">↻ 重新整理</button>
        <button id="add-btn" class="btn btn--primary" style="display:none">＋ 新增</button>
        <button id="readonly-btn" class="btn">🔓 編輯模式</button>
      </div>
    </div>
    <hr class="divider">
    <div class="desc">此名錄由團隊共用，任何新增／刪除都會同步給所有使用者</div>

    <div class="search-box">
      <span>🔍</span>
      <input id="search-input" type="text" placeholder="模糊搜尋：輸入公司、長官姓名或職稱的任一字，例如「總」…">
    </div>
    <div id="count-text" class="count-text">共收錄 0 筆 ／ 目前顯示 0 筆</div>

    <div id="list"></div>
    <div id="empty-state" class="empty-state">
      <div class="empty-seal">印</div>
      <div class="empty-title">目前還沒有任何資料</div>
      <div class="empty-sub">點擊右上角「新增」建立第一筆資料</div>
    </div>

    <div class="note">
      <strong>連接你自己的 Firebase：</strong>打開檔案原始碼，找到 <code>firebaseConfig</code>，
      貼上 Firebase Console 取得的設定即可。未連接前為示範模式，重新整理頁面資料會消失。
    </div>
  </div>

  <!-- 密碼輸入 Modal -->
  <div id="password-modal" class="modal">
    <div class="modal-box" style="max-width:340px;">
      <h2>輸入密碼以編輯 <button id="password-close" class="modal-close">✕</button></h2>
      <div class="field-group">
        <label>編輯密碼</label>
        <input id="password-input" type="password" placeholder="請輸入密碼">
      </div>
      <div class="modal-actions">
        <button type="button" id="password-cancel" class="btn">取消</button>
        <button type="button" id="password-submit" class="btn btn--primary">確認</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <h2 id="modal-title">新增資料 <button id="modal-close" class="modal-close">✕</button></h2>
      <form id="modal-form">
        <div class="field-group">
          <label>公司名稱（中）</label>
          <input id="company-zh" type="text" placeholder="例如：總統府" required>
        </div>
        <div class="field-group">
          <label>公司名稱（英）<span>選填</span></label>
          <input id="company-en" type="text" placeholder="例如：Office of the President">
        </div>

        <div class="section-label">長官資訊</div>
        <div class="field-group">
          <label>長官姓名（中）</label>
          <input id="name-zh" type="text" placeholder="例如：王小明" required>
        </div>
        <div class="field-group">
          <label>長官姓名（英）<span>選填</span></label>
          <input id="name-en" type="text" placeholder="例如：Wang Xiao-Ming">
        </div>
        <div class="field-row">
          <div>
            <label>職稱（中）<span>選填</span></label>
            <input id="title-zh" type="text" placeholder="例如：秘書長">
          </div>
          <div>
            <label>職稱（英）<span>選填</span></label>
            <input id="title-en" type="text" placeholder="例如：Secretary-General">
          </div>
        </div>

        <div class="section-label">照片</div>
        <div class="photo-row">
          <div id="photo-preview" class="photo-preview"><span class="photo-placeholder">🖼</span></div>
          <label class="file-btn">
            選擇圖片檔案
            <input id="photo-input" type="file" accept="image/*" style="display:none">
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn">取消</button>
          <button type="submit" class="btn btn--primary">儲存</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
